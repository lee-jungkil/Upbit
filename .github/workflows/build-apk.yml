name: Build AutoProfitBot APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
    - name: Gradle 권한
      run: chmod +x AutoProfitBot/gradlew
    - name: APK 빌드
      run: cd AutoProfitBot && ./gradlew assembleDebug --no-daemon
      timeout-minutes: 30
    - name: APK 다운로드 등록
      uses: actions/upload-artifact@v4
      with:
        name: AutoProfitBot-APK
        path: AutoProfitBot/app/build/outputs/apk/debug/*.apk
        retention-days: 30
