name: Build AutoProfitBot APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # 수동 실행 허용

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 코드 체크아웃
      uses: actions/checkout@v4

    - name: ☕ JDK 17 설정
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: 🤖 Android SDK 설정
      uses: android-actions/setup-android@v3

    - name: 🔑 Gradle 실행 권한 부여
      run: chmod +x gradlew

    - name: 📦 Gradle 캐시
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: 🔨 Debug APK 빌드
      run: ./gradlew assembleDebug --stacktrace --no-daemon
      timeout-minutes: 30

    - name: 📱 APK 파일 확인
      run: |
        find . -name "*.apk" -type f
        ls -lh app/build/outputs/apk/debug/ 2>/dev/null || echo "APK 경로 확인 필요"

    - name: 📤 Debug APK 아티팩트 업로드
      uses: actions/upload-artifact@v4
      with:
        name: AutoProfitBot-debug-apk
        path: app/build/outputs/apk/debug/*.apk
        retention-days: 30

    - name: 🏷️ 릴리스 태그 확인
      if: startsWith(github.ref, 'refs/tags/')
      run: echo "릴리스 빌드 감지됨"

  release:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    
    steps:
    - name: 📥 코드 체크아웃
      uses: actions/checkout@v4

    - name: ☕ JDK 17 설정
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: 🤖 Android SDK 설정
      uses: android-actions/setup-android@v3

    - name: 🔑 Gradle 실행 권한 부여
      run: chmod +x gradlew

    - name: 📦 Gradle 캐시
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: 🔨 Release APK 빌드 (미서명)
      run: ./gradlew assembleRelease --stacktrace --no-daemon
      timeout-minutes: 30

    - name: 📤 Release APK 아티팩트 업로드
      uses: actions/upload-artifact@v4
      with:
        name: AutoProfitBot-release-apk
        path: app/build/outputs/apk/release/*.apk
        retention-days: 90
