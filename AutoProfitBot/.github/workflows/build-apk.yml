name: Build AutoProfitBot APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 코드 체크아웃
      uses: actions/checkout@v4

    - name: JDK 17 설정
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Android SDK 설정
      uses: android-actions/setup-android@v3

    - name: Gradle 캐시 삭제 후 권한 부여
      run: |
        rm -rf ~/.gradle/caches
        chmod +x AutoProfitBot/gradlew

    - name: APK 빌드
      run: |
        cd AutoProfitBot
        ./gradlew assembleDebug --no-daemon --refresh-dependencies 2>&1
      timeout-minutes: 30

    - name: APK 다운로드 등록
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: AutoProfitBot-APK
        path: AutoProfitBot/app/build/outputs/apk/debug/*.apk
        retention-days: 30
